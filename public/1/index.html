<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shin Oyashiro Shock! — OYASHIRO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Noto+Sans+JP:wght@400;500;700&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg: #090909;
    --text-ja: #d4d4d4;
    --text-en: #888;
    --accent: #c49a2a;
    --accent-dim: rgba(196, 154, 42, 0.15);
    --rule: rgba(196, 154, 42, 0.25);
    --font-display: 'Playfair Display', serif;
    --font-ja: 'Noto Sans JP', sans-serif;
    --font-en: 'Source Sans 3', sans-serif;
  }

  html {
    scrollbar-width: thin;
    scrollbar-color: #1a1a1a var(--bg);
  }

  body {
    background: var(--bg);
    color: var(--text-ja);
    font-family: var(--font-en);
    font-weight: 400;
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #1a1a1a; }

  /* ── header ── */
  .header {
    padding: 60px 24px 40px;
    text-align: left;
  }

  .header-title {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 80px;
    color: var(--accent);
    letter-spacing: 0.12em;
    line-height: 1;
    text-transform: uppercase;
  }

  .header-subtitle {
    font-family: var(--font-ja);
    font-weight: 500;
    font-size: 18px;
    color: var(--text-en);
    margin-top: 8px;
    letter-spacing: 0.08em;
  }

  .header-count {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: 48px;
    color: #1a1a1a;
    margin-top: 4px;
    line-height: 1;
  }

  /* ── grid container ── */
  .grid-wrap {
    padding: 0 20px 100px;
    width: 100%;
  }

  /* ── question row ── */
  .q-row {
    display: grid;
    grid-template-columns: 30% 35% 35%;
    gap: 0 24px;
    align-items: start;
    padding: 36px 0;
    position: relative;
    border-bottom: 1px solid var(--rule);
    overflow: hidden;
    transition: border-color 0.3s ease;
  }

  .q-row:first-child {
    border-top: 1px solid var(--rule);
  }

  .q-row:nth-child(3n) {
    border-bottom-width: 2px;
  }

  .q-row:hover {
    border-left: 2px solid var(--accent);
    padding-left: 12px;
  }

  /* ── alternating rows: flip photo to right ── */
  .q-row.flipped {
    grid-template-columns: 35% 35% 30%;
  }

  .q-row.flipped .col-screenshot {
    order: 3;
  }

  .q-row.flipped .col-question {
    order: 1;
  }

  .q-row.flipped .col-options {
    order: 2;
  }

  .q-row.flipped .big-number {
    left: auto;
    right: 0;
    text-align: right;
  }

  /* ── enormous watermark number ── */
  .big-number {
    position: absolute;
    top: 50%;
    left: 0;
    transform: translateY(-50%);
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 200px;
    line-height: 1;
    color: #111;
    pointer-events: none;
    z-index: 0;
    user-select: none;
    letter-spacing: -0.02em;
  }

  /* ── column 1: screenshot ── */
  .col-screenshot {
    position: relative;
    z-index: 1;
  }

  .screenshot-img {
    width: 100%;
    max-width: 350px;
    display: block;
    filter: brightness(0.8);
    transition: filter 0.3s ease;
  }

  .q-row:hover .screenshot-img {
    filter: brightness(0.95);
  }

  /* ── column 2: question text ── */
  .col-question {
    position: relative;
    z-index: 1;
    padding-top: 4px;
  }

  .q-label {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .q-ja {
    font-family: var(--font-ja);
    font-weight: 500;
    font-size: 17px;
    color: var(--text-ja);
    line-height: 1.8;
  }

  .q-en {
    font-family: var(--font-en);
    font-weight: 300;
    font-size: 14px;
    font-style: italic;
    color: var(--text-en);
    line-height: 1.6;
    margin-top: 10px;
  }

  /* ── column 3: options ── */
  .col-options {
    position: relative;
    z-index: 1;
    padding-top: 4px;
  }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px 20px;
    list-style: none;
  }

  .opt-item {
    padding: 8px 0;
  }

  .opt-letter {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.05em;
    margin-bottom: 4px;
    opacity: 0.7;
  }

  .opt-ja {
    font-family: var(--font-ja);
    font-weight: 500;
    font-size: 14px;
    color: var(--text-ja);
    line-height: 1.6;
  }

  .opt-en {
    font-family: var(--font-en);
    font-weight: 300;
    font-size: 12px;
    font-style: italic;
    color: #666;
    line-height: 1.5;
    margin-top: 3px;
  }

  /* ── loading / error ── */
  .state-message {
    text-align: center;
    padding: 120px 2rem;
    font-family: var(--font-ja);
    font-weight: 500;
    font-size: 15px;
    color: var(--text-en);
    letter-spacing: 0.1em;
  }

  .state-message.is-error {
    color: var(--accent);
  }

  /* ── responsive ── */
  @media (max-width: 960px) {
    .header-title {
      font-size: 56px;
    }

    .q-row,
    .q-row.flipped {
      grid-template-columns: 1fr;
      gap: 20px 0;
      padding: 32px 0;
    }

    .q-row.flipped .col-screenshot,
    .q-row.flipped .col-question,
    .q-row.flipped .col-options {
      order: unset;
    }

    .big-number {
      font-size: 120px;
      top: 10px;
      transform: none;
    }

    .q-row.flipped .big-number {
      left: 0;
      right: auto;
      text-align: left;
    }

    .screenshot-img {
      max-width: 100%;
      width: 100%;
    }

    .options-grid {
      grid-template-columns: 1fr 1fr;
    }

    .q-row:hover {
      padding-left: 8px;
    }
  }

  @media (max-width: 600px) {
    .header {
      padding: 40px 16px 28px;
    }

    .header-title {
      font-size: 40px;
    }

    .header-subtitle {
      font-size: 15px;
    }

    .header-count {
      font-size: 36px;
    }

    .grid-wrap {
      padding: 0 16px 60px;
    }

    .q-row,
    .q-row.flipped {
      padding: 24px 0;
    }

    .big-number {
      font-size: 90px;
    }

    .options-grid {
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .q-ja {
      font-size: 15px;
    }

    .opt-ja {
      font-size: 13px;
    }
  }
</style>
</head>
<body>

<header class="header">
  <h1 class="header-title">OYASHIRO</h1>
  <div class="header-subtitle">新おやしろショック</div>
  <div class="header-count">24</div>
</header>

<div class="grid-wrap" id="gridWrap">
  <div class="state-message">読み込み中…</div>
</div>

<script>
(function () {
  'use strict';

  var wrap = document.getElementById('gridWrap');
  var optionLetters = ['A', 'B', 'C', 'D'];

  function padNum(n) {
    return n < 10 ? '0' + n : '' + n;
  }

  function encodeScreenshotURL(filename) {
    return '/screenshots/' + encodeURIComponent(filename);
  }

  function el(tag, className, textContent) {
    var node = document.createElement(tag);
    if (className) node.className = className;
    if (textContent !== undefined) node.textContent = textContent;
    return node;
  }

  function buildRow(q, index) {
    var num = index + 1;
    var isFlipped = num % 2 === 0;

    var row = el('div', 'q-row' + (isFlipped ? ' flipped' : ''));

    // enormous watermark number
    var bigNum = el('div', 'big-number', padNum(num));
    row.appendChild(bigNum);

    // column 1: screenshot
    var colImg = el('div', 'col-screenshot');
    var img = document.createElement('img');
    img.className = 'screenshot-img';
    img.src = encodeScreenshotURL(q.filename);
    img.alt = q.question.en;
    img.loading = 'lazy';
    colImg.appendChild(img);
    row.appendChild(colImg);

    // column 2: question
    var colQ = el('div', 'col-question');

    var label = el('div', 'q-label', 'Question ' + padNum(num));
    colQ.appendChild(label);

    var qJa = el('div', 'q-ja', q.question.ja);
    colQ.appendChild(qJa);

    var qEn = el('div', 'q-en', q.question.en);
    colQ.appendChild(qEn);

    row.appendChild(colQ);

    // column 3: options (2x2 grid)
    var colOpt = el('div', 'col-options');
    var grid = el('div', 'options-grid');

    q.options.forEach(function (opt, oi) {
      var item = el('div', 'opt-item');

      var letter = el('div', 'opt-letter', optionLetters[oi]);
      item.appendChild(letter);

      var oJa = el('div', 'opt-ja', opt.ja);
      item.appendChild(oJa);

      var oEn = el('div', 'opt-en', opt.en);
      item.appendChild(oEn);

      grid.appendChild(item);
    });

    colOpt.appendChild(grid);
    row.appendChild(colOpt);

    return row;
  }

  function render(questions) {
    wrap.innerHTML = '';
    var frag = document.createDocumentFragment();
    questions.forEach(function (q, i) {
      frag.appendChild(buildRow(q, i));
    });
    wrap.appendChild(frag);
  }

  function showError(msg) {
    wrap.innerHTML = '<div class="state-message is-error">' + msg + '</div>';
  }

  fetch('/api/questions')
    .then(function (res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function (data) {
      if (!Array.isArray(data) || data.length === 0) {
        showError('問題が見つかりません');
        return;
      }
      render(data);
    })
    .catch(function (err) {
      showError('読み込み失敗 — ' + err.message);
    });
})();
</script>

</body>
</html>
