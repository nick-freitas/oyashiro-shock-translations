<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shin Oyashiro Shock! — Tategaki</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;500;600;700;900&family=Noto+Serif+JP:wght@400;500;600;700&family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #1c1b22;
  --bg-sidebar: #17161c;
  --bg-row-alt: #1f1e26;
  --bg-row-hover: #24232c;
  --text-ja: #e0ddd8;
  --text-en: #908a80;
  --text-en-sub: #706a60;
  --accent-indigo: #3a3a6e;
  --accent-indigo-light: #5050a0;
  --accent-gold: #9a8a48;
  --accent-gold-bright: #c8b060;
  --border-row: #2a2930;
  --sidebar-width: 90px;
  --font-ja: 'Zen Old Mincho', 'Noto Serif JP', serif;
  --font-en: 'Cormorant', serif;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  background-color: var(--bg);
  color: var(--text-ja);
  font-family: var(--font-ja);
  display: flex;
}

/* ===== SCROLLABLE MAIN AREA ===== */
.main-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  height: 100vh;
  scrollbar-width: thin;
  scrollbar-color: #2a2930 var(--bg);
}

.main-content::-webkit-scrollbar { width: 6px; }
.main-content::-webkit-scrollbar-track { background: var(--bg); }
.main-content::-webkit-scrollbar-thumb { background: #2a2930; border-radius: 3px; }

/* ===== FIXED RIGHT SIDEBAR ===== */
.title-sidebar {
  width: var(--sidebar-width);
  min-width: var(--sidebar-width);
  height: 100vh;
  position: sticky;
  top: 0;
  right: 0;
  background: var(--bg-sidebar);
  border-left: 1px solid var(--border-row);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 0;
  flex-shrink: 0;
}

.sidebar-title {
  writing-mode: vertical-rl;
  text-orientation: mixed;
  font-family: var(--font-ja);
  font-size: 40px;
  font-weight: 900;
  color: #ffffff;
  letter-spacing: 0.15em;
  line-height: 1;
  text-shadow: 0 0 50px rgba(58, 58, 110, 0.25);
  user-select: none;
}

.sidebar-subtitle {
  writing-mode: vertical-rl;
  text-orientation: mixed;
  font-family: var(--font-ja);
  font-size: 13px;
  font-weight: 400;
  color: #484450;
  letter-spacing: 0.25em;
  line-height: 1;
  margin-left: 14px;
}

.sidebar-count {
  position: absolute;
  bottom: 28px;
  font-family: var(--font-en);
  font-size: 13px;
  font-weight: 400;
  color: var(--accent-gold);
  letter-spacing: 0.2em;
}

/* ===== INLINE HEADER (top of scroll area) ===== */
.page-header {
  padding: 36px 24px 28px;
  border-bottom: 1px solid var(--border-row);
  display: flex;
  align-items: baseline;
  gap: 20px;
}

.header-label {
  font-family: var(--font-en);
  font-size: 15px;
  font-weight: 400;
  font-style: italic;
  color: var(--text-en-sub);
  letter-spacing: 0.08em;
}

.header-count {
  font-family: var(--font-ja);
  font-size: 15px;
  color: var(--accent-gold);
  letter-spacing: 0.2em;
}

/* ===== QUIZ ROW ===== */
.quiz-row {
  display: grid;
  grid-template-columns: 220px 1fr 1fr;
  gap: 0 28px;
  padding: 24px 24px;
  position: relative;
  align-items: start;
  border-bottom: 1px solid var(--border-row);
  transition: background-color 0.35s ease;
}

.quiz-row:nth-child(even) {
  background-color: var(--bg-row-alt);
}

.quiz-row:hover {
  background-color: var(--bg-row-hover);
}

.quiz-row:hover .question-number {
  color: var(--accent-gold-bright);
}

.quiz-row:last-child {
  border-bottom: none;
}

/* Screenshot column */
.screenshot-col {
  display: flex;
  align-items: flex-start;
}

.screenshot-img {
  width: 100%;
  height: auto;
  display: block;
  border: 1px solid var(--border-row);
  opacity: 0.9;
  transition: opacity 0.3s ease;
}

.quiz-row:hover .screenshot-img {
  opacity: 1;
}

/* Question column */
.question-col {
  padding: 2px 0;
  position: relative;
}

.question-number {
  font-family: var(--font-ja);
  font-size: 18px;
  font-weight: 600;
  color: var(--accent-gold);
  letter-spacing: 0.1em;
  margin-bottom: 10px;
  transition: color 0.3s ease;
}

.question-ja {
  font-family: var(--font-ja);
  font-size: 26px;
  font-weight: 500;
  color: var(--text-ja);
  line-height: 1.7;
  margin-bottom: 10px;
}

.question-en {
  font-family: var(--font-en);
  font-size: 20px;
  font-weight: 400;
  font-style: italic;
  color: var(--text-en);
  line-height: 1.5;
}

/* Options column */
.options-col {
  padding: 2px 0 2px 24px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px 20px;
  border-left: 1px solid var(--border-row);
  align-content: start;
}

.option-item {
  padding: 4px 0 4px 14px;
  position: relative;
}

.option-item::before {
  content: '';
  position: absolute;
  left: 0;
  top: 14px;
  width: 4px;
  height: 4px;
  background: var(--accent-indigo);
  border-radius: 50%;
  opacity: 0.5;
}

.option-ja {
  font-family: var(--font-ja);
  font-size: 22px;
  font-weight: 400;
  color: #ccc8c0;
  line-height: 1.5;
}

.option-letter {
  font-family: var(--font-en);
  font-size: 17px;
  font-weight: 500;
  color: var(--accent-indigo-light);
  margin-right: 8px;
  letter-spacing: 0.05em;
}

.option-en {
  font-family: var(--font-en);
  font-size: 18px;
  font-weight: 300;
  font-style: italic;
  color: var(--text-en-sub);
  line-height: 1.4;
  margin-top: 3px;
}

/* ===== LOADING / ERROR ===== */
.loading-state {
  text-align: center;
  padding: 120px 20px;
  font-size: 1.2rem;
  color: #484450;
  letter-spacing: 0.15em;
}

.error-state {
  text-align: center;
  padding: 120px 20px;
  font-family: var(--font-en);
  font-size: 1rem;
  color: #706a60;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 1100px) {
  .quiz-row {
    grid-template-columns: 180px 1fr 1fr;
    gap: 0 20px;
  }
}

@media (max-width: 860px) {
  :root {
    --sidebar-width: 60px;
  }

  .sidebar-title {
    font-size: 28px;
  }

  .sidebar-subtitle {
    display: none;
  }

  .quiz-row {
    grid-template-columns: 1fr;
    gap: 16px 0;
    padding: 20px 16px;
  }

  .screenshot-col {
    justify-content: flex-start;
  }

  .screenshot-img {
    max-width: 260px;
  }

  .question-ja { font-size: 18px; }
  .question-en { font-size: 15px; }
  .option-ja { font-size: 16px; }
  .option-en { font-size: 14px; }

  .options-col {
    padding: 0;
    border-left: none;
    border-top: 1px solid var(--border-row);
    padding-top: 12px;
    grid-template-columns: 1fr 1fr;
  }
}

@media (max-width: 500px) {
  :root {
    --sidebar-width: 44px;
  }

  .sidebar-title {
    font-size: 22px;
  }

  .page-header {
    padding: 24px 12px 20px;
  }

  .quiz-row {
    padding: 16px 12px;
  }

  .question-ja { font-size: 17px; }
  .option-ja { font-size: 15px; }
}
</style>
</head>
<body>

<!-- Scrollable main content -->
<div class="main-content" id="mainContent">
  <header class="page-header">
    <span class="header-label">Shin Oyashiro Shock!</span>
    <span class="header-count">二十四問</span>
  </header>

  <main id="quizContainer">
    <div class="loading-state" id="loadingState">
      読み込み中&hellip;
    </div>
  </main>
</div>

<!-- Fixed right sidebar with vertical title -->
<aside class="title-sidebar">
  <div style="display:flex;align-items:flex-start;gap:0;">
    <div class="sidebar-subtitle">新・クイズ・ショック</div>
    <div class="sidebar-title">おやしろさま</div>
  </div>
  <div class="sidebar-count">二四</div>
</aside>

<script>
(function() {
  var KANJI_NUMS = [
    '一','二','三','四','五','六','七','八','九','十',
    '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
    '二十一','二十二','二十三','二十四'
  ];

  var OPTION_LETTERS = ['A', 'B', 'C', 'D'];

  var container = document.getElementById('quizContainer');
  var loadingEl = document.getElementById('loadingState');

  function esc(str) {
    if (!str) return '';
    var d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  fetch('/api/questions')
    .then(function(res) {
      if (!res.ok) throw new Error('Failed to fetch: ' + res.status);
      return res.json();
    })
    .then(function(questions) {
      loadingEl.remove();

      questions.forEach(function(q, idx) {
        var row = document.createElement('div');
        row.className = 'quiz-row';

        var kanjiNum = KANJI_NUMS[idx] || String(idx + 1);
        var imgUrl = '/screenshots/' + encodeURIComponent(q.filename);

        var optionsHtml = '';
        q.options.forEach(function(opt, oi) {
          optionsHtml +=
            '<div class="option-item">' +
              '<div class="option-ja">' +
                '<span class="option-letter">' + OPTION_LETTERS[oi] + '</span>' +
                esc(opt.ja) +
              '</div>' +
              '<div class="option-en">' + esc(opt.en) + '</div>' +
            '</div>';
        });

        row.innerHTML =
          '<div class="screenshot-col">' +
            '<img class="screenshot-img" src="' + imgUrl + '" alt="Question ' + (idx + 1) + '" loading="lazy">' +
          '</div>' +
          '<div class="question-col">' +
            '<div class="question-number">' + kanjiNum + '</div>' +
            '<div class="question-ja">' + esc(q.question.ja) + '</div>' +
            '<div class="question-en">' + esc(q.question.en) + '</div>' +
          '</div>' +
          '<div class="options-col">' +
            optionsHtml +
          '</div>';

        container.appendChild(row);
      });
    })
    .catch(function(err) {
      loadingEl.remove();
      var errorEl = document.createElement('div');
      errorEl.className = 'error-state';
      errorEl.textContent = 'Error: ' + err.message;
      container.appendChild(errorEl);
    });
})();
</script>
</body>
</html>
