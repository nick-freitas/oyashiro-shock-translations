<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shin Oyashiro Shock! — Split</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=DM+Serif+Display&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    font-size: 15px;
  }

  body {
    background: linear-gradient(to right, #000 45%, #0f0808 45%);
    color: #c8c0b8;
    min-height: 100vh;
    overflow-x: hidden;
    line-height: 1.5;
    font-family: 'Crimson Text', serif;
    position: relative;
  }

  /* The persistent vertical split line */
  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 45%;
    width: 1px;
    height: 100vh;
    background: #4a2020;
    z-index: 10;
    pointer-events: none;
  }

  /* ===== HEADER ===== */
  .header {
    position: relative;
    width: 100%;
    padding: 48px 20px 40px;
    display: grid;
    grid-template-columns: 45% 55%;
    align-items: baseline;
    border-bottom: 2px solid #fff;
  }

  .header-left {
    text-align: right;
    padding-right: 40px;
  }

  .header-right {
    text-align: left;
    padding-left: 40px;
  }

  .header-title-left {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2.2rem, 5vw, 3.6rem);
    color: #d0d0d0;
    letter-spacing: 0.04em;
    line-height: 1.1;
  }

  .header-title-right {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: clamp(1.8rem, 4.2vw, 3rem);
    color: #d8d0c8;
    letter-spacing: 0.08em;
    line-height: 1.1;
  }

  .header-sub-left {
    font-family: 'Crimson Text', serif;
    font-size: 0.82rem;
    color: #666;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 8px;
  }

  .header-sub-right {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.75rem;
    color: #6a5a50;
    letter-spacing: 0.1em;
    margin-top: 8px;
  }

  /* ===== QUIZ ROWS ===== */
  .quiz-container {
    width: 100%;
  }

  .quiz-row {
    display: grid;
    grid-template-columns: 15% 30% 55%;
    width: 100%;
    border-bottom: 2px solid rgba(255, 255, 255, 0.85);
    padding: 30px 0;
    position: relative;
    transition: background 0.2s ease;
  }

  .quiz-row:last-child {
    border-bottom: 2px solid rgba(255, 255, 255, 0.85);
  }

  /* Hover: dual-tone highlight — cool on left, warm on right */
  .quiz-row::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s ease;
    background: linear-gradient(to right,
      rgba(140, 160, 180, 0.04) 0%,
      rgba(140, 160, 180, 0.04) 45%,
      rgba(180, 140, 120, 0.04) 45%,
      rgba(180, 140, 120, 0.04) 100%
    );
  }

  .quiz-row:hover::after {
    opacity: 1;
  }

  /* Column 1: Number + Photo (left side of split) */
  .col-photo {
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    position: relative;
    z-index: 1;
  }

  .question-number {
    font-family: 'DM Serif Display', serif;
    font-size: 52px;
    color: #3a3a3a;
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .screenshot-img {
    width: 100%;
    max-width: 160px;
    height: auto;
    display: block;
    border: 1px solid #2a2a2a;
    filter: brightness(0.88) contrast(1.05);
  }

  /* Column 2: Question text (crosses the split boundary) */
  .col-question {
    padding: 4px 28px 4px 20px;
    position: relative;
    z-index: 1;
  }

  .question-ja {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1rem;
    font-weight: 400;
    line-height: 1.75;
    color: #c8c0b8;
    margin-bottom: 10px;
  }

  .question-en {
    font-family: 'Crimson Text', serif;
    font-size: 0.92rem;
    font-style: italic;
    line-height: 1.6;
    color: #8a8078;
  }

  /* Column 3: Options (right side of split) */
  .col-options {
    padding: 4px 20px 4px 28px;
    position: relative;
    z-index: 1;
  }

  .options-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-item {
    padding: 5px 0;
    position: relative;
  }

  .option-item + .option-item {
    border-top: 1px solid rgba(74, 32, 32, 0.25);
    padding-top: 10px;
  }

  .option-marker {
    font-family: 'DM Serif Display', serif;
    font-size: 0.85rem;
    color: #5a4040;
    margin-right: 8px;
    display: inline;
  }

  .option-ja {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.9rem;
    font-weight: 400;
    line-height: 1.6;
    color: #d0c8c0;
  }

  .option-en {
    font-family: 'Crimson Text', serif;
    font-size: 0.82rem;
    color: #7a7068;
    margin-top: 2px;
    padding-left: 24px;
    line-height: 1.5;
    font-style: italic;
  }

  /* ===== LOADING / ERROR ===== */
  .loading-state {
    text-align: center;
    padding: 120px 20px;
    color: #5a5a50;
    font-family: 'Crimson Text', serif;
    font-size: 1rem;
    letter-spacing: 0.08em;
  }

  .loading-state .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 1px solid #333;
    border-top-color: #888;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 18px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-state {
    text-align: center;
    padding: 100px 20px;
    color: #7a2020;
    font-family: 'Crimson Text', serif;
    font-size: 1rem;
    letter-spacing: 0.05em;
  }

  .error-state .error-sub {
    font-size: 0.85rem;
    margin-top: 12px;
    color: #555;
  }

  /* ===== FOOTER ===== */
  .footer {
    width: 100%;
    display: grid;
    grid-template-columns: 45% 55%;
    padding: 24px 0 20px;
    border-top: none;
  }

  .footer-left {
    text-align: right;
    padding-right: 40px;
    font-family: 'Crimson Text', serif;
    font-size: 0.7rem;
    color: #3a3a3a;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .footer-right {
    text-align: left;
    padding-left: 40px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.65rem;
    color: #4a3a30;
    letter-spacing: 0.1em;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 1100px) {
    .quiz-row {
      grid-template-columns: 14% 32% 54%;
    }

    .question-number { font-size: 42px; }
    .screenshot-img { max-width: 130px; }
  }

  @media (max-width: 850px) {
    /* Split disappears on tablet/mobile */
    body {
      background: #080606;
    }

    body::before {
      display: none;
    }

    .header {
      grid-template-columns: 1fr;
      text-align: center;
      padding: 36px 16px 28px;
    }

    .header-left {
      text-align: center;
      padding-right: 0;
      margin-bottom: 4px;
    }

    .header-right {
      text-align: center;
      padding-left: 0;
    }

    .quiz-row {
      grid-template-columns: 1fr;
      padding: 24px 16px;
      gap: 16px;
    }

    .col-photo {
      flex-direction: row;
      align-items: center;
      padding: 0;
      gap: 16px;
    }

    .question-number {
      font-size: 36px;
    }

    .screenshot-img {
      max-width: 120px;
    }

    .col-question {
      padding: 0;
    }

    .col-options {
      padding: 0;
    }

    .footer {
      grid-template-columns: 1fr;
      text-align: center;
      gap: 4px;
    }

    .footer-left, .footer-right {
      text-align: center;
      padding: 0 16px;
    }
  }

  @media (max-width: 500px) {
    .question-number { font-size: 28px; }
    .screenshot-img { max-width: 90px; }
    .question-ja { font-size: 0.92rem; }
    .option-ja { font-size: 0.85rem; }
    .quiz-row { padding: 18px 10px; }
  }
</style>
</head>
<body>

<!-- HEADER: Title split across the divide -->
<header class="header">
  <div class="header-left">
    <div class="header-title-left">OYASHIRO</div>
    <div class="header-sub-left">Shin Oyashiro Shock</div>
  </div>
  <div class="header-right">
    <div class="header-title-right">ショック!</div>
    <div class="header-sub-right">新・おやしろショック — 全24問</div>
  </div>
</header>

<!-- CONTENT -->
<div id="content" class="quiz-container">
  <div class="loading-state" id="loading">
    <div class="spinner"></div>
    <div>Loading questions...</div>
  </div>
</div>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-left">Higurashi no Naku Koro ni</div>
  <div class="footer-right">ひぐらしのなく頃に</div>
</footer>

<script>
(function() {
  'use strict';

  var MARKERS = ['A.', 'B.', 'C.', 'D.'];

  function esc(str) {
    var d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function buildRows(questions) {
    var html = '';

    questions.forEach(function(q, i) {
      var num = i + 1;
      var imgSrc = '/screenshots/' + encodeURIComponent(q.filename);

      html += '<div class="quiz-row">';

      // Column 1: Number + Photo
      html += '<div class="col-photo">';
      html += '<div class="question-number">' + num + '</div>';
      html += '<img class="screenshot-img" src="' + esc(imgSrc) + '" alt="Question ' + num + '" loading="lazy">';
      html += '</div>';

      // Column 2: Question text
      html += '<div class="col-question">';
      html += '<div class="question-ja">' + esc(q.question.ja) + '</div>';
      html += '<div class="question-en">' + esc(q.question.en) + '</div>';
      html += '</div>';

      // Column 3: Options
      html += '<div class="col-options"><ul class="options-list">';
      q.options.forEach(function(opt, oi) {
        html += '<li class="option-item">';
        html += '<span class="option-marker">' + MARKERS[oi] + '</span>';
        html += '<span class="option-ja">' + esc(opt.ja) + '</span>';
        html += '<div class="option-en">' + esc(opt.en) + '</div>';
        html += '</li>';
      });
      html += '</ul></div>';

      html += '</div>';
    });

    return html;
  }

  function showError(msg) {
    var el = document.getElementById('content');
    el.innerHTML =
      '<div class="error-state">' +
      '<div>' + esc(msg) + '</div>' +
      '<div class="error-sub">Failed to load quiz data.</div>' +
      '</div>';
  }

  function init() {
    var contentEl = document.getElementById('content');

    fetch('/api/questions')
      .then(function(res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(function(data) {
        if (!Array.isArray(data) || data.length === 0) {
          throw new Error('No questions returned');
        }
        contentEl.innerHTML = buildRows(data);
      })
      .catch(function(err) {
        showError(err.message);
        console.error('Load error:', err);
      });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

</body>
</html>
